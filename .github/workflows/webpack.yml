name: Build

on:
  push:
    branches:
      - build

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Get version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:unpack

      - name: Zip unpacked
        run: Compress-Archive -Path dist/win-unpacked/* -DestinationPath dist/FSC-portable-v${{ env.APP_VERSION }}.zip
        shell: pwsh

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: FSC-portable-v${{ env.APP_VERSION }}
          path: dist/FSC-portable-v${{ env.APP_VERSION }}.zip
          retention-days: 30
